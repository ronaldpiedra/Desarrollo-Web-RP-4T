<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto DAW - Semana 8</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- 🔷 ENCABEZADO -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">DAW S8</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <!-- 🔷 CONTENIDO PRINCIPAL -->
    <div class="container my-5">

        <!-- 🎠 CARRUSEL -->
        <div id="carouselExample" class="carousel slide mb-5" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://via.placeholder.com/800x300" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/800x300/555" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/800x300/777" class="d-block w-100">
                </div>
            </div>
        </div>

        <!-- 📊 TABLA -->
        <h3>Lista de Productos</h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Descripción</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Laptop</td>
                    <td>$800</td>
                    <td>Equipo portátil</td>
                </tr>
                <tr>
                    <td>Mouse</td>
                    <td>$15</td>
                    <td>Mouse inalámbrico</td>
                </tr>
            </tbody>
        </table>

        <!-- 📩 FORMULARIO -->
        <h3 class="mt-5">Contacto</h3>
        <form id="contactForm">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control">
                <small class="text-danger" id="errorNombre"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" id="correo" class="form-control">
                <small class="text-danger" id="errorCorreo"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Mensaje</label>
                <textarea id="mensaje" class="form-control"></textarea>
                <small class="text-danger" id="errorMensaje"></small>
            </div>

            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>

        <!-- 🔔 BOTÓN ALERTA -->
        <button class="btn btn-warning mt-4" onclick="mostrarAlerta()">Mostrar alerta</button>

    </div>

    <!-- 🔷 PIE DE PÁGINA -->
    <footer class="bg-dark text-white text-center p-3">
        © 2026 - Desarrollo de Aplicaciones Web
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS propio -->
    <script src="script.js"></script>
</body>
</html>
