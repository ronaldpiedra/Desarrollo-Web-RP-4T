<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-3 text-danger">Confirmar eliminación</h1>
                <p>¿Está seguro de eliminar el producto <strong>{{ producto[1] }}</strong>?</p>

                <form action="{{ url_for('borrar_producto_web', id_producto=producto[0]) }}" method="POST" class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{{ url_for('listar_productos_web') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
